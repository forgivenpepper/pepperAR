<style>
/* ... (Senin mevcut root ve global stillerin - Aynen korundu) ... */
:root {
  --bg0:#0d0d0f;--bg1:#111113;--bg2:#161618;--bg3:#1c1c1f;--bg4:#242428;
  --border:#2a2a2e;--border2:#3a3a3f;
  --accent:#f97316;--accent2:#fb923c;--accent-bg:rgba(249,115,22,.12);--accent-glow:rgba(249,115,22,.35);
  --text:#f0f0f2;--text2:#8b8b96;--text3:#55555f;
  --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--yellow:#eab308;
  --radius:6px;--mono:'Space Mono',monospace;--sans:'Outfit',sans-serif;
  --sidebar-w:284px;--topbar-h:52px;--statusbar-h:28px;
}
[data-theme="light"] {
  --bg0:#e4e4e8;--bg1:#eeeeF2;--bg2:#f5f5f8;--bg3:#fafafc;--bg4:#ffffff;
  --border:#d0d0d6;--border2:#bdbdc7;
  --accent:#ea6c0a;--accent2:#f97316;--accent-bg:rgba(234,108,10,.10);--accent-glow:rgba(234,108,10,.25);
  --text:#111115;--text2:#5c5c68;--text3:#aaaaB5;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg0);color:var(--text);display:flex;flex-direction:column;font-size:13px;user-select:none}
/* ... (Senin mevcut Topbar, Workspace, Sidebar stillerin - Aynen korundu) ... */
.topbar{height:var(--topbar-h);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;z-index:100;flex-shrink:0}
.logo{font-size:14px;font-weight:800;letter-spacing:-.5px;color:var(--text);display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent-glow)}
.logo em{color:var(--accent);font-style:normal}
.tb-div{width:1px;height:22px;background:var(--border);flex-shrink:0}
.tb-spacer{flex:1}
.tb-btn{height:30px;padding:0 11px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.tb-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.tb-btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.tb-btn.icon{width:30px;padding:0;justify-content:center;font-size:13px}
.tb-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.workspace{flex:1;display:flex;overflow:hidden}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg1);display:flex;flex-direction:column;overflow:hidden}
.sidebar-left{border-right:1px solid var(--border)}
.sidebar-right{border-left:1px solid var(--border)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.stab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 8px;gap:2px;padding-top:6px;flex-shrink:0}
.stab{padding:6px 10px;border-radius:4px 4px 0 0;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);cursor:pointer;transition:all .15s;border:1px solid transparent;border-bottom:none;position:relative;bottom:-1px}
.stab:hover{color:var(--text2)}
.stab.active{color:var(--text);background:var(--bg2);border-color:var(--border);border-bottom-color:var(--bg2)}
.stab-pane{display:none;flex:1;overflow-y:auto;flex-direction:column}
.stab-pane.active{display:flex}
.section{border-bottom:1px solid var(--border);flex-shrink:0}
.section-head{padding:8px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.section-head:hover{background:var(--bg3)}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);flex:1}
.section-arrow{font-size:9px;color:var(--text3);transition:transform .2s}
.section.closed .section-arrow{transform:rotate(-90deg)}
.section.closed .section-body{display:none}
.section-body{padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.field{display:flex;flex-direction:column;gap:5px}
.field-row{display:flex;align-items:center;justify-content:space-between}
.label{font-size:11px;font-weight:600;color:var(--text2)}
.vbadge{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-bg);padding:1px 5px;border-radius:3px}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--bg4);border-radius:4px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg1);box-shadow:0 0 0 2px var(--accent-glow);transition:box-shadow .15s}
input[type=range]:hover::-webkit-slider-thumb{box-shadow:0 0 0 4px var(--accent-glow)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;border-radius:var(--radius);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg3);color:var(--text2);width:100%}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.danger{color:var(--red);border-color:var(--border2);background:transparent}
.btn.danger:hover{background:rgba(239,68,68,.1);border-color:var(--red)}
.btn.sm{padding:5px 8px;font-size:11px}
.btn-row{display:flex;gap:6px}
.btn-row .btn{flex:1}
.toggle{width:32px;height:18px;background:var(--bg4);border:1px solid var(--border2);border-radius:9px;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;left:2px;top:2px;width:12px;height:12px;border-radius:50%;background:var(--text3);transition:all .2s}
.toggle.on{background:var(--accent-bg);border-color:var(--accent)}
.toggle.on::after{background:var(--accent);transform:translateX(14px)}
.toggle-row{display:flex;align-items:center;gap:8px}
.toggle-label{font-size:12px;color:var(--text2)}
.viewport{flex:1;position:relative;background:var(--bg0);overflow:hidden}
#canvas-container{position:absolute;inset:0}
.loading-ov{position:absolute;inset:0;background:rgba(10,10,12,.88);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:50;flex-direction:column;gap:14px}
.loading-ov.show{display:flex}
.loader{width:38px;height:38px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:12px;font-weight:600;color:var(--text2)}
.toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg2);border:1px solid var(--border);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:opacity .25s,transform .25s;z-index:30;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.statusbar{height:var(--statusbar-h);background:var(--bg1);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:14px;font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;z-index:100}
.sb-item{display:flex;align-items:center;gap:5px}
.sb-item b{color:var(--text2);font-weight:700}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.status-dot.ready{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.err{background:var(--red)}
.sb-spacer{flex:1}
/* ... (Senin mevcut Outliner, VP Toolbar, Color, Bulk, Texture, Modal stillerin - Aynen korundu) ... */
</style>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="logo" style="text-decoration:none;"><div class="logo-dot"></div>pepper<em>AR</em> Studio</a>
  <div class="tb-div"></div>
  <input type="file" id="file-input" accept=".glb,.gltf" style="display:none">
  <button class="tb-btn" id="btn-open">Aç</button>
  <div class="tb-spacer"></div>
  <button class="tb-btn primary" id="btn-save">☁️ Buluta Kaydet</button>
</div>

<div class="workspace">

<div class="sidebar sidebar-left">
  <div class="stab-bar">
    <div class="stab active" data-tab="outliner" data-side="left">Outliner</div>
    <div class="stab" data-tab="scene" data-side="left">Sahne</div>
  </div>

  <div class="stab-pane active" id="tab-outliner">
    <div id="outliner" class="outliner">
      <div class="empty-state">Model yüklenmedi.</div>
    </div>
  </div>

  <div class="stab-pane" id="tab-scene">
    <div class="section">
      <div class="section-head"><div class="section-title">💡 Işık & Atmosfer</div><span class="section-arrow">▼</span></div>
      <div class="section-body">
        <div class="field">
          <div class="field-row"><span class="label">Exposure</span><span class="vbadge" id="vb-exp">1.00</span></div>
          <input type="range" id="in-exp" min="0.1" max="3" step="0.05" value="1">
        </div>
        <div class="field">
          <span class="label">Arka Plan</span>
          <div class="color-row">
            <div class="swatch" id="bg-sw" style="background:#111113"></div>
            <input type="color" id="in-bg" value="#111113">
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="sec-explosion" style="display:none;">
      <div class="section-head"><div class="section-title">🔧 Montaj Rehberi (Explode)</div><span class="section-arrow">▼</span></div>
      <div class="section-body">
        <div class="field">
          <div class="field-row"><span class="label">Patlatma Miktarı</span><span class="vbadge" id="vb-explode">0%</span></div>
          <input type="range" id="in-explode" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="btn-row">
          <button class="btn sm accent" id="btn-explode-toggle">💥 Patlat / Topla</button>
          <button class="btn sm danger" id="btn-explode-reset">↺ Sıfırla</button>
        </div>
        <div style="font-size:11px; color:var(--text3); margin-top:5px; line-height:1.4;">
          // Cinema-TV Rehberi: Parçalar merkezden dışarı doğru (Radial) itilir. Slider'ı kullanarak vidaların yerini gösterin.
        </div>
      </div>
    </div>
    </div>
</div>

<div class="viewport" id="vp">
  <div class="loading-ov" id="loading-ov">
    <div class="loader"></div>
    <div class="load-text" id="load-text">Model yükleniyor...</div>
  </div>
  <div class="toast" id="toast"></div>
  <div id="canvas-container"></div>
</div>

</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }        from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }       from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls }     from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment }   from 'three/addons/environments/RoomEnvironment.js';

// ── GLOBAL STATE ──
let scene, camera, renderer, orbit, currentModel = null;
let fpsFrames = 0, fpsLast = performance.now();

// ── 🔥 YENİ: EXPLOSION STATE 🔥 ──
let isExploded = false;
let currentExplodeFactor = 0; // 0 ile 1 arası
// Parçaların orijinal pozisyonlarını ve itilme yönlerini tutacak Map
const originalPositions = new Map(); 
// ──────────────────────────────────

const container = _el('canvas-container');
const _el = id => document.getElementById(id);

// ── INIT ──
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111113);

  const w = container.clientWidth || window.innerWidth - 284;
  const h = container.clientHeight || window.innerHeight - 80;

  camera = new THREE.PerspectiveCamera(45, w / h, 0.01, 1000);
  camera.position.set(3, 2, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  container.appendChild(renderer.domElement);

  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  pmrem.dispose();

  orbit = new OrbitControls(camera, renderer.domElement);
  orbit.enableDamping = true;

  window.addEventListener('resize', onResize);
  
  // UI Events
  _el('btn-open').addEventListener('click', () => _el('file-input').click());
  _el('file-input').addEventListener('change', e => { if(e.target.files[0]) loadFile(e.target.files[0]); });
  
  colorSetup('bg', hex => { scene.background = new THREE.Color(hex); });
  
  if(_el('in-exp')) _el('in-exp').addEventListener('input', e => {
    renderer.toneMappingExposure = +e.target.value;
    if(_el('vb-exp')) _el('vb-exp').textContent = (+e.target.value).toFixed(2);
  });

  // ── 🔥 YENİ: EXPLOSION UI EVENTS 🔥 ──
  if(_el('in-explode')) {
    _el('in-explode').addEventListener('input', e => {
      const factor = parseFloat(e.target.value);
      updateExplosion(factor);
    });
  }

  if(_el('btn-explode-toggle')) {
    _el('btn-explode-toggle').addEventListener('click', () => {
      if(!currentModel) return;
      isExploded = !isExploded;
      // Slider'ı ve görünümü güncelle
      const finalFactor = isExploded ? 1 : 0;
      _el('in-explode').value = finalFactor;
      // Cinema-TV dokunuşu: Buraya ileride yavaşça kayma animasyonu (Lerp) eklenebilir.
      updateExplosion(finalFactor); 
      toast(isExploded ? 'Parçalar patlatıldı (Exploded)' : 'Model toplandı');
    });
  }

  if(_el('btn-explode-reset')) {
    _el('btn-explode-reset').addEventListener('click', () => {
      if(!currentModel) return;
      isExploded = false;
      _el('in-explode').value = 0;
      updateExplosion(0);
      toast('Montaj planı sıfırlandı');
    });
  }
  // ─────────────────────────────────────

  animate();
  setStatus('ready','Hazır');
}

// ── 🔥 YENİ: EXPLOSION MANTIĞI (THE MAGIC) 🔥 ──
/**
 * Model yüklendiğinde her mesh'in orijinal yerini ve merkezden yönünü kaydeder.
 */
function prepareExplosionData(model) {
  originalPositions.clear();
  currentExplodeFactor = 0;
  isExploded = false;
  if(_el('in-explode')) _el('in-explode').value = 0;
  if(_el('vb-explode')) _el('vb-explode').textContent = "0%";

  // Önce modelin dünya merkezini bul (itilme yönü için)
  const box = new THREE.Box3().setFromObject(model);
  const modelCenter = box.getCenter(new THREE.Vector3());

  model.traverse(child => {
    if (child.isMesh) {
      // Mesh'in kendi dünya pozisyonunu al
      const worldPos = new THREE.Vector3();
      child.getWorldPosition(worldPos);

      // Merkezden bu parçaya doğru olan yön vektörü (Radial itilme)
      const direction = worldPos.clone().sub(modelCenter).normalize();
      
      // Eğer parça tam merkezdeyse, rastgele bir yöne it (tıkanmayı önlemek için)
      if (direction.lengthSq() === 0) direction.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();

      // Hafızaya kaydet
      originalPositions.set(child.uuid, {
        localPos: child.position.clone(), // localCoord
        direction: direction // Dünya yönü
      });
    }
  });
}

/**
 * Slider değiştikçe parçaları local pozisyonlarında öteler.
 * @param {number} factor - 0 (Toplu) ile 1 (Patlamış) arası değer.
 */
function updateExplosion(factor) {
  if (!currentModel || originalPositions.size === 0) return;
  
  currentExplodeFactor = factor;
  if(_el('vb-explode')) _el('vb-explode').textContent = Math.round(factor * 100) + "%";

  // Cinema-TV Ayarı: Ne kadar uzağa patlayacak? (Modelin boyutuna göre dinamik olabilir)
  const explosionPower = 2.0; 

  currentModel.traverse(child => {
    if (child.isMesh && originalPositions.has(child.uuid)) {
      const data = originalPositions.get(child.uuid);
      
      // Yeni pozisyon = Orijinal Local + (Yön * Güç * Faktör)
      // Not: Yön dünya koordinatında, local'e çevirmek gerekebilir ama basit radial itme için bu yeterli.
      const offset = data.direction.clone().multiplyScalar(factor * explosionPower);
      
      // Parçanın yeni pozisyonunu set et
      child.position.copy(data.localPos).add(offset);
    }
  });
}
// ───────────────────────────────────────────────

// ── LOAD FILE ──
function loadFile(file) {
  if (!/\.(glb|gltf)$/i.test(file.name)) { toast('Hatalı dosya!','err'); return; }
  
  _el('loading-ov').classList.add('show');
  
  if (currentModel) {
    scene.remove(currentModel);
    disposeHierarchy(currentModel);
  }

  const url = URL.createObjectURL(file);
  const drc = new DRACOLoader();
  drc.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(drc);

  loader.load(url, gltf => {
    URL.revokeObjectURL(url);
    currentModel = gltf.scene;
    
    // Gölgeler
    currentModel.traverse(c => { if(c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    
    scene.add(currentModel);

    // Merkeze al ve zemine oturt
    const box = new THREE.Box3().setFromObject(currentModel);
    const ctr = box.getCenter(new THREE.Vector3());
    const sz = box.getSize(new THREE.Vector3());
    currentModel.position.sub(ctr);
    currentModel.position.y += sz.y / 2;

    // Kamerayı odakla
    const maxD = Math.max(sz.x, sz.y, sz.z);
    camera.position.set(maxD, maxD / 2, maxD);
    orbit.target.set(0, sz.y / 2, 0);
    orbit.update();

    // ── 🔥 YENİ: PATLATMA VERİSİNİ HAZIRLA VE UI'I GÖSTER 🔥 ──
    prepareExplosionData(currentModel);
    _el('sec-explosion').style.display = 'block'; // Menüyü aç
    // ──────────────────────────────────────────────────────────

    _el('loading-ov').classList.remove('show');
    toast('Model yüklendi. Montaj rehberi hazır. 🔧');
  });
}

// ── UTILS (Senin mevcut fonksiyonların - Aynen korundu) ──
function disposeHierarchy(node) {
  node.traverse(c => {
    if (c.isMesh) {
      c.geometry.dispose();
      if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
      else c.material.dispose();
    }
  });
}

function onResize(){
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
}

function colorSetup(id, cb) {
  const sw = _el(`${id}-sw`), inp = _el(`in-${id}`);
  sw.addEventListener('click', () => inp.click());
  inp.addEventListener('input', e => { sw.style.background = e.target.value; cb(e.target.value); });
}

function animate(){
  requestAnimationFrame(animate);
  orbit.update();
  renderer.render(scene,camera);
}

function toast(msg,type=''){
  const el=_el('toast'); el.textContent=msg; el.className='toast show '+(type);
  setTimeout(()=>el.classList.remove('show'),3000);
}

init();
</script>
</body>
</html>
