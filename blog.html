<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blog — pepperAR Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #000000;
      --bg-card: #0c0c0e;
      --bg-glass: rgba(6, 6, 7, 0.85);
      --border: rgba(255, 255, 255, 0.05);
      --border-light: rgba(255, 255, 255, 0.1);
      --accent: #facc15;
      --accent-glow: rgba(250, 204, 21, 0.25);
      --text-main: #ffffff;
      --text-muted: #88888e;
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    /* === GLOBAL MERKEZLEME & KAYMA ENGELLEYİCİ === */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    html { scroll-behavior: smooth; }

    /* === HEADER STİLLERİ (Index ile Milimetrik Aynı) === */
    header {
      position: fixed; top: 0; left: 0; width: 100%; height: 72px;
      background: var(--bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; z-index: 100;
    }
    
    .logo-container { display: flex; align-items: center; justify-content: center; text-decoration: none; height: 100%; }
    
    .main-logo-img {
      height: 100px !important;
      width: auto !important;
      transform: translateY(16px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: top center;
    }

    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 15px; font-weight: 500; transition: 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    
    .nav-actions { display: flex; gap: 16px; align-items: center; }
    .btn {
      padding: 10px 24px; border-radius: 6px; font-weight: 700; font-size: 14px; 
      cursor: pointer; text-decoration: none; text-transform: uppercase;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-primary { background: var(--accent); color: #000; border: none; box-shadow: 0 4px 15px var(--accent-glow); }

    /* === İÇERİK MERKEZLEME === */
    .page-header {
      padding: 180px 5% 60px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .page-header h1 { font-size: clamp(40px, 6vw, 70px); font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; }
    .page-header h1 span { color: var(--accent); }
    .page-header p { font-size: 20px; color: var(--text-muted); max-width: 700px; }

    section { 
      padding: 40px 5%; 
      max-width: 1200px; 
      margin: 0 auto; 
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* BLOG GRID */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 32px;
      width: 100%;
      margin-top: 20px;
    }

    .blog-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }
    .blog-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent-glow);
    }

    .blog-image {
      width: 100%;
      aspect-ratio: 16/9;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blog-content { padding: 30px; text-align: left; }
    .blog-tag { font-family: var(--font-mono); font-size: 11px; color: var(--accent); margin-bottom: 15px; }
    .blog-content h2 { font-size: 24px; font-weight: 700; margin-bottom: 15px; }
    .blog-content p { color: var(--text-muted); font-size: 15px; }

    /* Reveal */
    .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    footer {
      border-top: 1px solid var(--border); padding: 50px 5%;
      text-align: center; color: var(--text-muted); font-size: 14px;
      margin-top: 80px;
    }

    @media (max-width: 768px) {
      .main-logo-img { height: 80px !important; transform: translateY(10px); }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <script>
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
        // Mevcut sayfayı sarı yap
        const navLinks = document.querySelectorAll('.nav-links a');
        navLinks.forEach(link => {
          if (link.href.includes('blog.html')) {
            link.classList.add('active');
          }
        });
      });
  </script>

  <div class="page-header reveal active">
    <div style="font-family: var(--font-mono); font-size: 12px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px;">// RECENT_ARTICLES</div>
    <h1>3D ve AR <span>Dünyası</span></h1>
    <p>Sektörel haberler ve teknik ipuçlarıyla ürünlerinizi bir adım öne taşıyın.</p>
  </div>

  <section class="reveal">
    <div class="blog-grid">
      <a href="#" class="blog-card">
        <div class="blog-image"></div>
        <div class="blog-content">
          <div class="blog-tag">STRATEJİ</div>
          <h2>Neden WebAR? E-Ticaretin Geleceği</h2>
          <p>Uygulama indirme zorunluluğunu ortadan kaldıran WebAR teknolojisinin detayları.</p>
        </div>
      </a>
      </div>
  </section>

  <footer>
    <p>&copy; 2026 <strong>pepperAR Studio</strong> // Powered by <strong>Cemer</strong></p>
  </footer>

  <script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  </script>
</body>
</html>
